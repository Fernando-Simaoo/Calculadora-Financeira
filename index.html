<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Financeira</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <main class="container">
        <h2>Calculadora de Juros</h2>
        
        <form id="calc-form" onsubmit="event.preventDefault(); calcularJuros();">
            <div class="form-group">
                <label for="capital">Capital Inicial (R$)</label>
                <input type="number" id="capital" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label for="taxa">Taxa de Juros Mensal (%)</label>
                <input type="number" id="taxa" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label for="tempo">Período (Meses)</label>
                <input type="number" id="tempo" min="1" required>
            </div>
            
            <div class="actions">
                <button type="submit" class="btn-primario">Calcular</button>
                <button type="reset" class="btn-secundario" onclick="limparVisor()">Limpar</button>
            </div>
        </form>

        <div class="resultado-container">
            <span>Montante Final:</span>
            <strong id="resultado">R$ 0,00</strong>
        </div>
    </main>
    <script src="index.js"></script>
</body>
</html>
